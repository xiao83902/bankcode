    <style>
        :root {
            --primary: #1a5f7a;
            --primary-dark: #134b5f;
            --accent: #ffc857;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --success: #48bb78;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: 0 0 20px 20px;
            box-shadow: var(--shadow-lg);
        }
        
        header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        header p {
            opacity: 0.9;
            font-size: 1rem;
        }
        
        .search-box {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }
        
        .search-wrapper {
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 16px 20px;
            padding-right: 50px;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 95, 122, 0.1);
        }
        
        .search-input::placeholder {
            color: var(--text-light);
        }
        
        .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.2rem;
        }
        
        .tips {
            margin-top: 16px;
            padding: 12px 16px;
            background: #f0f9ff;
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--primary-dark);
        }
        
        .tips strong {
            display: block;
            margin-bottom: 4px;
        }
        
        .tips-examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        
        .tip-tag {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .tip-tag:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }
        
        .results-info {
            padding: 12px 16px;
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }
        
        .results-count {
            color: var(--primary);
            font-weight: 700;
        }
        
        .results-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .result-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
            transition: all 0.3s ease;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-card:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-lg);
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 12px;
        }
        
        .bank-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .bank-name .icon {
            font-size: 1.3rem;
        }
        
        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            white-space: nowrap;
        }
        
        .copy-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.02);
        }
        
        .copy-btn.copied {
            background: var(--success);
        }
        
        .code-info {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .code-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .code-label {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        .code-value {
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            background: #f0f9ff;
            padding: 4px 12px;
            border-radius: 6px;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        
        .no-results .icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        
        .no-results h3 {
            color: var(--text);
            margin-bottom: 8px;
        }
        
        .no-results p {
            color: var(--text-light);
        }
        
        footer {
            text-align: center;
            padding: 30px;
            color: var(--text-light);
            font-size: 0.85rem;
        }
        
        footer a {
            color: var(--primary);
            text-decoration: none;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .search-input { font-size: 1rem; padding: 14px 16px; }
            .result-header { flex-direction: column; }
            .copy-btn { width: 100%; justify-content: center; }
            .code-info { flex-direction: column; gap: 8px; }
        }
    </style>

    const sortedAliases = Object.keys(BANK_ALIASES).sort((a, b) => b.length - a.length);
    
    for (const alias of sortedAliases) {
        if (query.includes(alias) || queryLower.includes(alias.toLowerCase())) {
            bankCode = BANK_ALIASES[alias];
            locationKeyword = query.replace(alias, '').trim();
            if (!locationKeyword) {
                locationKeyword = queryLower.replace(alias.toLowerCase(), '').trim();
            }
            break;
        }
    }
    
    // 如果沒找到簡稱，檢查是否有 3 碼銀行代碼
    if (!bankCode) {
        const codeMatch = query.match(/\b(\d{3})\b/);
        if (codeMatch) {
            bankCode = codeMatch[1];
            locationKeyword = query.replace(/\b\d{3}\b/, '').trim();
        }
    }
    
    locationKeyword = locationKeyword.trim();
    
    // 產生地區關鍵字的變體（臺/台互換）
    const locationVariants = [];
    if (locationKeyword) {
        locationVariants.push(
            locationKeyword,
            locationKeyword.replace(/臺/g, '台'),
            locationKeyword.replace(/台/g, '臺')
        );
    }
    
    // 分類搜尋結果
    const nameMatches = [];
    const codeMatches = [];
    
    for (const bank of banks) {
        // 如果指定了銀行代碼，先過濾
        if (bankCode && bank.headCode !== bankCode) continue;
        
        // 有地區關鍵字時的處理
        if (locationKeyword) {
            let nameMatch = false;
            
            // 標準匹配
            for (const v of locationVariants) {
                if (bank.name.includes(v)) {
                    nameMatch = true;
                    break;
                }
            }
            
            // 農漁會模糊匹配
            if (!nameMatch && (bank.name.includes('農會') || bank.name.includes('漁會'))) {
                let simplifiedName = bank.name;
                ['鄉農會', '鎮農會', '區農會', '市農會', '鄉漁會', '鎮漁會', '區漁會', '市漁會'].forEach(suffix => {
                    simplifiedName = simplifiedName.replace(suffix, bank.name.includes('農會') ? '農會' : '漁會');
                });
                simplifiedName = simplifiedName.replace('分部', '');
                
                for (const v of locationVariants) {
                    let simplifiedVar = v;
                    ['鄉', '鎮', '區', '市', '分部'].forEach(s => {
                        simplifiedVar = simplifiedVar.replace(s, '');
                    });
                    if (simplifiedVar && simplifiedName.includes(simplifiedVar)) {
                        nameMatch = true;
                        break;
                    }
                }
            }
            
            if (nameMatch) nameMatches.push(bank);
        }
        // 沒有地區關鍵字但有銀行代碼
        else if (bankCode) {
            codeMatches.push(bank);
        }
        // 完全沒有關鍵字的通用搜尋
        else {
            const variants = [query, query.replace(/臺/g, '台'), query.replace(/台/g, '臺')];
            let matched = false;
            
            for (const v of variants) {
                if (bank.name.includes(v)) {
                    nameMatches.push(bank);
                    matched = true;
                    break;
                }
            }
            
            // 農漁會模糊匹配
            if (!matched && (query.includes('農會') || query.includes('漁會'))) {
                let simplifiedQuery = query;
                ['鄉', '鎮', '區', '市', '分部'].forEach(s => {
                    simplifiedQuery = simplifiedQuery.replace(s, '');
                });
                
                if (bank.name.includes('農會') || bank.name.includes('漁會')) {
                    let simplifiedName = bank.name;
                    ['鄉農會', '鎮農會', '區農會', '市農會', '鄉漁會', '鎮漁會', '區漁會', '市漁會'].forEach(suffix => {
                        simplifiedName = simplifiedName.replace(suffix, bank.name.includes('農會') ? '農會' : '漁會');
                    });
                    simplifiedName = simplifiedName.replace('分部', '');
                    
                    if (simplifiedName.includes(simplifiedQuery)) {
                        nameMatches.push(bank);
                        matched = true;
                    }
                }
            }
            
            if (!matched && bank.branchCode.includes(query)) {
                codeMatches.push(bank);
            }
        }
    }
    
    // 決定返回哪些結果
    let results = nameMatches.length > 0 ? nameMatches : codeMatches;
    
    // 排序
    results.sort((a, b) => a.branchCode.localeCompare(b.branchCode));
    
    return results;
}

// ===== UI 相關 =====
const searchInput = document.getElementById('searchInput');
const resultsDiv = document.getElementById('results');
const toast = document.getElementById('toast');

let debounceTimer;

searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        performSearch();
    }, 200);
});

searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        clearTimeout(debounceTimer);
        performSearch();
    }
});

function quickSearch(query) {
    searchInput.value = query;
    performSearch();
    searchInput.focus();
}

function performSearch() {
    const query = searchInput.value.trim();
    
    if (!query) {
        resultsDiv.innerHTML = '';
        return;
    }
    
    const results = fuzzySearch(query);
    renderResults(results, query);
}

function renderResults(results, query) {
    if (results.length === 0) {
        resultsDiv.innerHTML = `
            <div class="no-results">
                <div class="icon">🔍</div>
                <h3>找不到符合「${escapeHtml(query)}」的結果</h3>
                <p>試試其他關鍵字，例如：羅東一銀、板橋合庫、0072610</p>
            </div>
        `;
        return;
    }
    
    const maxResults = 20;
    const showing = Math.min(results.length, maxResults);
    
    let html = `
        <div class="results-info">
            <span>✅ 找到 <span class="results-count">${results.length}</span> 筆結果</span>
            ${results.length > maxResults ? `<span style="color: var(--text-light)">（顯示前 ${maxResults} 筆）</span>` : ''}
        </div>
        <div class="results-list">
    `;
    
    for (let i = 0; i < showing; i++) {
        const bank = results[i];
        html += `
            <div class="result-card">
                <div class="result-header">
                    <div class="bank-name">
                        <span class="icon">🏦</span>
                        ${escapeHtml(bank.name)}
                    </div>
                    <button class="copy-btn" onclick="copyCode('${bank.branchCode}', this)">
                        📋 複製代碼
                    </button>
                </div>
                <div class="code-info">
                    <div class="code-item">
                        <span class="code-label">分行代碼</span>
                        <span class="code-value">${bank.branchCode}</span>
                    </div>
                    <div class="code-item">
                        <span class="code-label">總行代碼</span>
                        <span class="code-value">${bank.headCode}</span>
                    </div>
                </div>
            </div>
        `;
    }
    
    html += '</div>';
    resultsDiv.innerHTML = html;
}

function copyCode(code, btn) {
    navigator.clipboard.writeText(code).then(() => {
        // 更新按鈕狀態
        const originalText = btn.innerHTML;
        btn.innerHTML = '✓ 已複製';
        btn.classList.add('copied');
        
        // 顯示 toast
        showToast();
        
        // 恢復按鈕
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.classList.remove('copied');
        }, 2000);
    }).catch(err => {
        console.error('複製失敗:', err);
        alert('複製失敗，請手動複製代碼：' + code);
    });
}

function showToast() {
    toast.classList.add('show');
    setTimeout(() => {
        toast.classList.remove('show');
    }, 2000);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 頁面載入時聚焦搜尋框
window.onload = () => {
    searchInput.focus();
};
    </script>
